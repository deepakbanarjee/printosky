<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Permanent move to /academic.html. Search engines update via canonical + 0-second meta refresh. -->
  <title>Academic Project Builder — Printosky</title>
  <meta name="description" content="Order your academic project report at Printosky, Thrissur. Custom research, formatting, printing, and binding.">
  <link rel="canonical" href="https://printosky.com/academic.html">
  <meta name="robots" content="noindex,follow">
  <meta http-equiv="refresh" content="0; url=/academic.html">
  <script>
    // JS fallback so the redirect happens even when meta-refresh is blocked
    // (some privacy extensions strip it). Preserves any query string.
    (function () {
      var qs = window.location.search || '';
      window.location.replace('/academic.html' + qs);
    })();
  </script>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f5f5; color: #222; margin: 0;
      display: flex; align-items: center; justify-content: center; min-height: 100vh;
    }
    .box {
      background: #fff; padding: 32px 40px; border-radius: 8px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08); max-width: 480px; text-align: center;
    }
    h1 { font-size: 1.25rem; margin: 0 0 12px; color: #0f2557; }
    p  { margin: 0 0 16px; line-height: 1.5; }
    a  { color: #e8500a; font-weight: 600; text-decoration: none; }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <!-- Visible only if both meta-refresh and JS fail (very rare) -->
  <noscript>
    <meta http-equiv="refresh" content="0; url=/academic.html">
  </noscript>
  <div class="box">
    <h1>This page has moved</h1>
    <p>The Academic Project Builder is now at our updated order page.</p>
    <p><a href="/academic.html">Continue to /academic.html →</a></p>
  </div>
</body>
</html>
