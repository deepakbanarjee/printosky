[build]
  publish   = "website"
  functions = "netlify/functions"

[build.environment]
  SECRETS_SCAN_ENABLED = "false"

[[redirects]]
  from   = "/admin"
  to     = "/admin.html"
  status = 200

[[redirects]]
  from   = "/superadmin"
  to     = "/superadmin.html"
  status = 200

[[redirects]]
  from   = "/mis"
  to     = "/mis.html"
  status = 200

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/admin"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/superadmin"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/mis"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
